<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spear Focus</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #080808;
      font-family: 'DM Sans', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 108px;
      height: 108px;
      border-radius: 26px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 400;
      color: #f0ece4;
      letter-spacing: -0.3px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #f0ece4;
      color: #080808;
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 400;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }

    .btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div class="wrap">

    <img class="icon" src="icon.png" alt="Spear Focus icon" />

    <h1>Spear Focus</h1>

    <a class="btn" href="https://apps.apple.com/us/app/spear-productivity-timer/id6759192194" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      Download on the App Store
    </a>

  </div>
</body>
</html>
